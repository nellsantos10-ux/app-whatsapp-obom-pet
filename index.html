<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Personalizada</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#fff;
}

/* HEADER */
header{
  background:#1c1c1c;
  padding:10px;
  position:sticky;
  top:0;
  z-index:10;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.home-btn{
  background:#2a2a2a;
  padding:6px 10px;
  border-radius:20px;
}

.cart-btn{
  background:#e53935;
  padding:6px 10px;
  border-radius:20px;
}

.cart-count{
  background:#fff;
  color:#e53935;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
}

/* ===== BANNER AJUSTADO ===== */
.banner{
  margin-top:8px;
  height:90px;
  overflow:hidden;
  border-radius:10px;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PRODUTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1e1e1e;
  border-radius:15px;
  padding:10px;
}

/* IMAGEM PADRÃO */
.card img{
  width:100%;
  height:120px;
  object-fit:contain;
  background:#fff;
  border-radius:10px;
}

.btn{
  background:#e53935;
  padding:10px;
  text-align:center;
  border-radius:10px;
  margin-top:10px;
}

/* CARRINHO */
.cart{
  position:fixed;
  bottom:0;
  width:100%;
  height:90vh;
  background:#181818;
  display:none;
  border-radius:20px 20px 0 0;
  flex-direction:column;
}

.cart-content{
  overflow:auto;
  padding:15px;
  flex:1;
}

.input-group{
  margin-top:10px;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2a2a2a;
  color:#fff;
}

.checkbox{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.qtd button{
  background:#e53935;
  border:none;
  color:#fff;
  padding:5px 10px;
  border-radius:5px;
}

.finalizar{
  background:#e53935;
  padding:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="top-bar">
    <div class="home-btn" onclick="voltarHome()">🏠</div>
    <h3>O Bom pet Vargem Grande</h3>
    <div class="cart-btn" onclick="toggleCart()">
      🛒 <span id="count" class="cart-count">0</span>
    </div>
  </div>

  <div class="banner">
    <img src="banner.png">
  </div>
</header>

<div class="grid" id="produtos"></div>

<!-- CARRINHO -->
<div class="cart" id="cart">
<div class="cart-content">

<h3>Seu Pedido</h3>
<div id="lista"></div>
<div id="total"></div>

<h3>Seus Dados</h3>

<div class="input-group">
<input id="nome" placeholder="Nome">
</div>

<div class="input-group">
<input id="cpf" placeholder="CPF" inputmode="numeric">
</div>

<div class="checkbox">
<input type="checkbox" id="semCpf" onchange="toggleCPF()">
<label>Não informar CPF (sem cashback)</label>
</div>

<div class="input-group">
<input id="cep" placeholder="CEP" inputmode="numeric" onblur="buscarCEP()">
</div>

<div class="input-group">
<input id="rua" placeholder="Rua">
</div>

<div class="input-group">
<input id="numero" placeholder="Número" inputmode="numeric">
</div>

<div class="input-group">
<input id="referencia" placeholder="Referência">
</div>

<div class="input-group">
<select id="pagamento" onchange="verTroco()">
<option value="">Forma de pagamento</option>
<option>PIX</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>
</div>

<div class="input-group" id="boxTroco" style="display:none;">
<input id="troco" placeholder="Troco" inputmode="numeric">
</div>

</div>

<div class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</div>
</div>

<script>

/* ===== 20 PRODUTOS ===== */
let produtos = [
{nome:"Golden special adulto frango e carne 15kg 1", preco:159.90, estoque:10, img:"Golden.jpg"},
{nome:"Produto 2", preco:12, estoque:10, img:"Golden.jpg"},
{nome:"Produto 3", preco:14, estoque:10, img:"Golden.jpg"},
{nome:"Produto 4", preco:16, estoque:10, img:"Golden.jpg"},
{nome:"Produto 5", preco:18, estoque:10, img:"Golden.jpg"},
{nome:"Produto 6", preco:20, estoque:10, img:"Golden.jpg"},
{nome:"Produto 7", preco:22, estoque:10, img:"Golden.jpg"},
{nome:"Produto 8", preco:24, estoque:10, img:"Golden.jpg"},
{nome:"Produto 9", preco:26, estoque:10, img:"Golden.jpg"},
{nome:"Produto 10", preco:28, estoque:10, img:"Golden.jpg"},
{nome:"Produto 11", preco:30, estoque:10, img:"Golden.jpg"},
{nome:"Produto 12", preco:32, estoque:10, img:"Golden.jpg"},
{nome:"Produto 13", preco:34, estoque:10, img:"Golden.jpg"},
{nome:"Produto 14", preco:36, estoque:10, img:"Golden.jpg"},
{nome:"Produto 15", preco:38, estoque:10, img:"Golden.jpg"},
{nome:"Produto 16", preco:40, estoque:10, img:"Golden.jpg"},
{nome:"Produto 17", preco:42, estoque:10, img:"Golden.jpg"},
{nome:"Produto 18", preco:44, estoque:10, img:"Golden.jpg"},
{nome:"Produto 19", preco:46, estoque:10, img:"Golden.jpg"},
{nome:"Produto 20", preco:48, estoque:10, img:"Golden.jpg"}
];

let carrinho=[];

/* RENDER */
function renderProdutos(){
let div=document.getElementById("produtos");
div.innerHTML="";
produtos.forEach((p,i)=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div>${p.nome}</div>
<div>R$ ${p.preco.toFixed(2).replace('.',',')}</div>
<div>Estoque: ${p.estoque}</div>
<div class="btn" onclick="addCarrinho(${i})">Adicionar</div>
</div>`;
});
}

/* CPF MÁSCARA */
document.getElementById("cpf").addEventListener("input", function(e){
let v = e.target.value.replace(/\D/g,"");
if(v.length > 11) v = v.slice(0,11);
v = v.replace(/(\d{3})(\d)/,"$1.$2");
v = v.replace(/(\d{3})(\d)/,"$1.$2");
v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
e.target.value = v;
});

/* RESTANTE DO SISTEMA IGUAL AO SEU */
function addCarrinho(i){
let p=produtos[i];
if(p.estoque<=0){alert("Sem estoque!");return;}
let item=carrinho.find(x=>x.index===i);
if(item){item.qtd++;}else{carrinho.push({index:i,qtd:1});}
atualizar();
}

function atualizar(){
let lista=document.getElementById("lista");
let total=0,count=0;
lista.innerHTML="";
carrinho.forEach((item,i)=>{
let p=produtos[item.index];
total+=p.preco*item.qtd;
count+=item.qtd;
lista.innerHTML+=`
<div class="item">
${p.nome} x${item.qtd}
</div>`;
});
document.getElementById("total").innerText="Total: R$ "+total.toFixed(2).replace('.',',');
document.getElementById("count").innerText=count;
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="flex"?"none":"flex";
}

function voltarHome(){
document.getElementById("cart").style.display="none";
}

renderProdutos();

</script>

</body>
</html>
