<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Bom Pet</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:#121212;color:#fff;}
header{
  background:#1c1c1c;
  padding:10px;
  position:sticky;
  top:0;
  z-index:1000; /* 🔥 garante que fique na frente */
}
.top-bar{display:flex;justify-content:space-between;align-items:center;}
.home-btn{background:#2a2a2a;padding:6px 10px;border-radius:20px;}
.cart-btn{background:#e53935;padding:6px 10px;border-radius:20px;}
.cart-count{background:#fff;color:#e53935;border-radius:50%;padding:2px 6px;font-size:12px;}
.banner{margin-top:8px;height:90px;overflow:hidden;border-radius:10px;}
.banner img{width:100%;height:100%;object-fit:cover;}

.info-entrega{
background:#1f1f1f;
color:#ff4d4d;
text-align:center;
padding:10px;
font-size:13px;
border-bottom:1px solid #333;
}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card{background:#1e1e1e;border-radius:15px;padding:10px;}
.card img{width:100%;height:120px;object-fit:contain;background:#fff;border-radius:10px;}
.btn{background:#e53935;padding:10px;text-align:center;border-radius:10px;margin-top:10px;}
.cart{
  position:fixed;
  top:60px; /* 🔥 não cobre o topo */
  width:100%;
  height:calc(100vh - 60px);
  background:#181818;
  display:none;
  border-radius:20px 20px 0 0;
  flex-direction:column;
  z-index:999;
}
.cart-content{
  overflow:auto;
  padding:15px;
  flex:1;
  padding-bottom:80px; /* espaço pro botão */
}
.input-group{margin-top:10px;}
.input-group input,.input-group select{width:100%;padding:14px;border-radius:12px;border:none;background:#2a2a2a;color:#fff;}
.checkbox{display:flex;align-items:center;gap:8px;margin-top:10px;}
.item{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center;}
.qtd button{background:#e53935;border:none;color:#fff;padding:5px 10px;border-radius:5px;}
.finalizar{
  background:#e53935;
  padding:15px;
  text-align:center;
  font-weight:bold;
  position:sticky;
  bottom:0;
  z-index:10;
}
 header.carrinho-aberto h3,
 header.carrinho-aberto .banner,
 header.carrinho-aberto .info-entrega{
  display:none;
}
</style>
</head>

<body>

<header>
<div class="top-bar">
<div class="home-btn" onclick="voltarHome()">🏠</div>
<h3>O Bom Pet</h3>
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count" class="cart-count">0</span></div>
</div>

<div class="banner"><img src="img/banner.png"></div>

<div class="info-entrega">
🚚 Entregas a partir de R$30 • Acima de R$50,00 = FRETE GRÁTIS • Taxa R$3,00 Para pedido Abaixo de R$50,00
</div>

</header>

<div class="grid" id="produtos"></div>

<div class="cart" id="cart">
<div class="cart-content">

<h3>Seu Pedido</h3>
<div id="lista"></div>
<div id="total"></div>
<div id="freteInfo"></div>

<h3>Seus Dados</h3>

<div class="input-group"><input id="nome" placeholder="Nome"></div>
<div class="input-group"><input id="cpf" placeholder="CPF" inputmode="numeric"></div>

<div class="checkbox">
<input type="checkbox" id="semCpf">
<label>Não informar CPF (sem cashback)</label>
</div>

<div class="input-group"><input id="cep" placeholder="CEP" inputmode="numeric" onblur="buscarCEP()"></div>
<div class="input-group"><input id="rua" placeholder="Rua"></div>
<div class="input-group"><input id="numero" placeholder="Número" inputmode="numeric"></div>
<div class="input-group"><input id="referencia" placeholder="Referência"></div>

<div class="input-group">
<select id="pagamento" onchange="verTroco()">
<option value="">Forma de pagamento</option>
<option>PIX</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>
</div>

<div class="input-group" id="boxTroco" style="display:none;">
<input id="troco" placeholder="Troco" inputmode="numeric">
</div>

</div>

<div class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</div>
</div>

<script>

let produtos = [
{nome:"Produto 1", preco:10, estoque:10, img:"img/produto1.png"},
{nome:"Produto 2", preco:12, estoque:10, img:"img/produto2.png"},
{nome:"Produto 3", preco:14, estoque:10, img:"img/produto3.png"},
{nome:"Produto 4", preco:16, estoque:10, img:"img/produto4.png"},
{nome:"Produto 5", preco:18, estoque:10, img:"img/produto5.png"},
{nome:"Produto 6", preco:20, estoque:10, img:"img/produto6.png"},
{nome:"Produto 7", preco:22, estoque:10, img:"img/produto7.png"},
{nome:"Produto 8", preco:24, estoque:10, img:"img/produto8.png"},
{nome:"Produto 9", preco:26, estoque:10, img:"img/produto9.png"},
{nome:"Produto 10", preco:28, estoque:10, img:"img/produto10.png"},
{nome:"Produto 11", preco:30, estoque:10, img:"img/produto11.png"},
{nome:"Produto 12", preco:32, estoque:10, img:"img/produto12.png"},
{nome:"Produto 13", preco:34, estoque:10, img:"img/produto13.png"},
{nome:"Produto 14", preco:36, estoque:10, img:"img/produto14.png"},
{nome:"Produto 15", preco:38, estoque:10, img:"img/produto15.png"},
{nome:"Produto 16", preco:40, estoque:10, img:"img/produto16.png"},
{nome:"Produto 17", preco:42, estoque:10, img:"img/produto17.png"},
{nome:"Produto 18", preco:44, estoque:10, img:"img/produto18.png"},
{nome:"Produto 19", preco:46, estoque:10, img:"img/produto19.png"},
{nome:"Produto 20", preco:48, estoque:10, img:"img/produto20.png"}
];

let carrinho=[];

/* CPF máscara */
document.getElementById("cpf").addEventListener("input",function(e){
let v=e.target.value.replace(/\D/g,"").slice(0,11);
v=v.replace(/(\d{3})(\d)/,"$1.$2");
v=v.replace(/(\d{3})(\d)/,"$1.$2");
v=v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
e.target.value=v;
});

/* VALIDAR CPF */
function validarCPF(cpf){
cpf = cpf.replace(/\D/g,'');
if(cpf.length != 11 || /^(\d)\1+$/.test(cpf)) return false;
let soma=0;
for(let i=0;i<9;i++){ soma+=cpf[i]*(10-i); }
let resto=(soma*10)%11;
if(resto>=10) resto=0;
if(resto!=cpf[9]) return false;
soma=0;
for(let i=0;i<10;i++){ soma+=cpf[i]*(11-i); }
resto=(soma*10)%11;
if(resto>=10) resto=0;
return resto==cpf[10];
}

/* CHECKBOX */
document.getElementById("semCpf").addEventListener("change",function(){
let cpf=document.getElementById("cpf");
if(this.checked){
cpf.value="";
cpf.disabled=true;
alert("Não informando o CPF você não participará do nosso programa de cashback");
}else{
cpf.disabled=false;
}
});

/* TROCO */
document.getElementById("troco").addEventListener("input",function(e){
let v=e.target.value.replace(/\D/g,'');
if(!v) return e.target.value="";
v=(v/100).toFixed(2);
v=v.replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
e.target.value="R$ "+v;
});

/* CEP */
function buscarCEP(){
let cep=document.getElementById("cep").value.replace(/\D/g,'');
if(cep.length!==8)return;
fetch(`https://viacep.com.br/ws/${cep}/json/`)
.then(r=>r.json())
.then(d=>{
if(!d.erro){
document.getElementById("rua").value=d.logradouro;
}
});
}

function verTroco(){
let p=document.getElementById("pagamento").value;
document.getElementById("boxTroco").style.display=p==="Dinheiro"?"block":"none";
}

/* FRETE */
function calcularTotal(){
let subtotal=0;
carrinho.forEach(i=>{
let p=produtos[i.index];
subtotal+=p.preco*i.qtd;
});
let frete=0,msg="";
if(subtotal < 30){
  msg = "Pedido mínimo R$30";
  frete = 0;
}else if(subtotal >= 30 && subtotal < 50){
  frete = 3;
  msg = "Frete: R$ 3,00";
}else{
  frete = 0;
  msg = "Frete grátis acima de R$50";
}
return{subtotal,frete,total:subtotal+frete,msg};
}

/* CARRINHO */
function addCarrinho(i){
let p=produtos[i];
if(p.estoque<=0){alert("Sem estoque!");return;}
p.estoque--;
let item=carrinho.find(x=>x.index===i);
if(item){item.qtd++;}else{carrinho.push({index:i,qtd:1});}
renderProdutos();
atualizar();
}

function atualizar(){
let lista=document.getElementById("lista");
let dados=calcularTotal();
let count=0;
lista.innerHTML="";

carrinho.forEach((item,i)=>{
let p=produtos[item.index];
count+=item.qtd;

lista.innerHTML+=`
<div class="item">
<div>${p.nome}<br>R$ ${p.preco.toFixed(2)} x ${item.qtd}</div>
<div class="qtd">
<button onclick="menos(${i})">-</button>
<button onclick="mais(${i})">+</button>
</div>
</div>`;
});

document.getElementById("total").innerText="Total: R$ "+dados.total.toFixed(2).replace('.',',');
document.getElementById("freteInfo").innerText=dados.msg;
document.getElementById("count").innerText=count;
}

function mais(i){
let p=produtos[carrinho[i].index];
if(p.estoque<=0){alert("Sem estoque!");return;}
p.estoque--;
carrinho[i].qtd++;
renderProdutos();
atualizar();
}

function menos(i){
let p=produtos[carrinho[i].index];
p.estoque++;
carrinho[i].qtd--;
if(carrinho[i].qtd<=0)carrinho.splice(i,1);
renderProdutos();
atualizar();
}
function nomeInput(id){
  return document.getElementById(id).value.trim();
}
/* FINALIZAR */
function finalizarPedido(){

let nome=nomeInput("nome");
let cpf=nomeInput("cpf");
let semCpf=document.getElementById("semCpf").checked;
let rua=nomeInput("rua");
let numero=nomeInput("numero");
let ref=nomeInput("referencia");
let cep=nomeInput("cep");
let pag=nomeInput("pagamento");
let troco=nomeInput("troco");

let dados=calcularTotal();

if(carrinho.length===0){alert("Carrinho vazio");return;}
if(!nome||!rua||!numero||!pag){alert("Preencha tudo!");return;}
if(dados.subtotal<30){alert("Pedido mínimo R$30");return;}
if(!semCpf && !validarCPF(cpf)){alert("CPF inválido");return;}

let msg="🛒 *NOVO PEDIDO*\n\n";

carrinho.forEach(i=>{
let p=produtos[i.index];
msg+=`• ${p.nome}\nQtd: ${i.qtd}\nValor: R$ ${p.preco.toFixed(2).replace('.',',')}\n\n`;
});

msg+=`💰 Total: R$ ${dados.total.toFixed(2).replace('.',',')}\n\n`;
msg+=`👤 Nome: ${nome}\n`;

if(!semCpf) msg+=`CPF: ${cpf}\n`;

msg+=`\n📍 ${rua}, ${numero}\nCEP: ${cep}\nRef: ${ref}\n`;
msg+=`\n💳 ${pag}\n`;

if(pag==="Dinheiro" && troco){
msg+=`💵 Troco para: ${troco}\n`;
}

window.open("https://wa.me/5521966388515?text="+encodeURIComponent(msg));
}
/* CONTROLE SCROLL */
/* CONTROLE SCROLL + HEADER */
function toggleCart(){
  let c = document.getElementById("cart");
  let header = document.querySelector("header");

  if(c.style.display === "flex"){
    c.style.display = "none";
    header.classList.remove("carrinho-aberto");
    document.body.style.overflow = "auto"; // libera scroll
  }else{
    c.style.display = "flex";
    header.classList.add("carrinho-aberto");
    document.body.style.overflow = "hidden"; // trava scroll
 }
}

function voltarHome(){
  document.getElementById("cart").style.display = "none";
  document.querySelector("header").classList.remove("carrinho-aberto");
  document.body.style.overflow = "auto"; // libera scroll
}

function renderProdutos(){
let div=document.getElementById("produtos");
div.innerHTML="";
produtos.forEach((p,i)=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div>${p.nome}</div>
<div>R$ ${p.preco.toFixed(2).replace('.',',')}</div>
<div>Estoque: ${p.estoque}</div>
<div class="btn" onclick="addCarrinho(${i})">Adicionar</div>
</div>`;
});
}

renderProdutos();

</script>

</body>
</html>
