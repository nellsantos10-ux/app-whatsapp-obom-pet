<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Personalizada</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:#fff;
}

/* HEADER */
header{
  background:#1c1c1c;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.home-btn{
  background:#2a2a2a;
  padding:8px 12px;
  border-radius:20px;
}

.cart-btn{
  background:#e53935;
  padding:8px 12px;
  border-radius:20px;
}

.cart-count{
  background:#fff;
  color:#e53935;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
}

/* BANNER */
.banner{
  margin-top:10px;
}

.banner img{
  width:100%;
  border-radius:12px;
}

/* PRODUTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1e1e1e;
  border-radius:15px;
  padding:10px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.btn{
  background:#e53935;
  padding:10px;
  text-align:center;
  border-radius:10px;
  margin-top:10px;
}

/* CARRINHO */
.cart{
  position:fixed;
  bottom:0;
  width:100%;
  height:90vh;
  background:#181818;
  display:none;
  border-radius:20px 20px 0 0;
  flex-direction:column;
}

.cart-content{
  overflow:auto;
  padding:15px;
  flex:1;
}

.input-group{
  margin-top:10px;
}

.input-group input,
.input-group select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2a2a2a;
  color:#fff;
}

.checkbox{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.qtd button{
  background:#e53935;
  border:none;
  color:#fff;
  padding:5px 10px;
  border-radius:5px;
}

.finalizar{
  background:#e53935;
  padding:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="top-bar">
    <div class="home-btn" onclick="voltarHome()">🏠</div>
    <h3>O Bom pet Vargem Grande</h3>
    <div class="cart-btn" onclick="toggleCart()">
      🛒 <span id="count" class="cart-count">0</span>
    </div>
  </div>

  <!-- BANNER / LOGO -->
  <div class="banner">
    <img src="img/banner.jpg">
  </div>

</header>

<div class="grid" id="produtos"></div>

<!-- CARRINHO -->
<div class="cart" id="cart">
<div class="cart-content">

<h3>Seu Pedido</h3>
<div id="lista"></div>
<div id="total"></div>

<h3>Seus Dados</h3>

<div class="input-group">
<input id="nome" placeholder="Nome">
</div>

<div class="input-group">
<input id="cpf" placeholder="CPF" inputmode="numeric">
</div>

<div class="checkbox">
<input type="checkbox" id="semCpf" onchange="toggleCPF()">
<label>Não informar CPF (sem cashback)</label>
</div>

<div class="input-group">
<input id="cep" placeholder="CEP" inputmode="numeric" onblur="buscarCEP()">
</div>

<div class="input-group">
<input id="rua" placeholder="Rua">
</div>

<div class="input-group">
<input id="numero" placeholder="Número" inputmode="numeric">
</div>

<div class="input-group">
<input id="referencia" placeholder="Referência">
</div>

<div class="input-group">
<select id="pagamento" onchange="verTroco()">
<option value="">Forma de pagamento</option>
<option>PIX</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>
</div>

<div class="input-group" id="boxTroco" style="display:none;">
<input id="troco" placeholder="Troco" inputmode="numeric">
</div>

</div>

<div class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</div>
</div>

<script>

/* ===== 20 PRODUTOS INDIVIDUAIS (EDITÁVEL) ===== */
let produtos = [

{nome:"Golden special adulto frango e carne 15kg", preco:159.90, estoque:10, img:"img/Golden.jpg"},
{nome:"Produto 2", preco:12, estoque:10, img:"img/produto2.png"},
{nome:"Produto 3", preco:14, estoque:10, img:"img/produto3.png"},
{nome:"Produto 4", preco:16, estoque:10, img:"img/produto4.png"},
{nome:"Produto 5", preco:18, estoque:10, img:"img/produto5.png"},

{nome:"Produto 6", preco:20, estoque:10, img:"img/produto6.png"},
{nome:"Produto 7", preco:22, estoque:10, img:"img/produto7.png"},
{nome:"Produto 8", preco:24, estoque:10, img:"img/produto8.png"},
{nome:"Produto 9", preco:26, estoque:10, img:"img/produto9.png"},
{nome:"Produto 10", preco:28, estoque:10, img:"img/produto10.png"},

{nome:"Produto 11", preco:30, estoque:10, img:"img/produto11.png"},
{nome:"Produto 12", preco:32, estoque:10, img:"img/produto12.png"},
{nome:"Produto 13", preco:34, estoque:10, img:"img/produto13.png"},
{nome:"Produto 14", preco:36, estoque:10, img:"img/produto14.png"},
{nome:"Produto 15", preco:38, estoque:10, img:"img/produto15.png"},

{nome:"Produto 16", preco:40, estoque:10, img:"img/produto16.png"},
{nome:"Produto 17", preco:42, estoque:10, img:"img/produto17.png"},
{nome:"Produto 18", preco:44, estoque:10, img:"img/produto18.png"},
{nome:"Produto 19", preco:46, estoque:10, img:"img/produto19.png"},
{nome:"Produto 20", preco:48, estoque:10, img:"img/produto20.png"}

];

let carrinho=[];

/* ===== RENDER ===== */
function renderProdutos(){
let div=document.getElementById("produtos");
div.innerHTML="";

produtos.forEach((p,i)=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div>${p.nome}</div>
<div>R$ ${p.preco.toFixed(2).replace('.',',')}</div>
<div>Estoque: ${p.estoque}</div>
<div class="btn" onclick="addCarrinho(${i})">Adicionar</div>
</div>`;
});
}

/* CPF MÁSCARA */
document.getElementById("cpf").addEventListener("input", function(e){
let v = e.target.value.replace(/\D/g,"");
if(v.length > 11) v = v.slice(0,11);
v = v.replace(/(\d{3})(\d)/,"$1.$2");
v = v.replace(/(\d{3})(\d)/,"$1.$2");
v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
e.target.value = v;
});

/* TROCO */
document.getElementById("troco").addEventListener("input", function(e){
let v = e.target.value.replace(/\D/g,"");
v = (v/100).toFixed(2) + "";
v = v.replace(".", ",");
v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
e.target.value = "R$ " + v;
});

/* CPF CHECK */
function toggleCPF(){
let check=document.getElementById("semCpf");
let cpf=document.getElementById("cpf");

if(check.checked){
cpf.value="";
cpf.disabled=true;
alert("Não informando o CPF você não participará do nosso programa de cashback");
}else{
cpf.disabled=false;
}
}

/* RESTO DO SISTEMA (SEM ALTERAR) */
function addCarrinho(i){
let p=produtos[i];
if(p.estoque<=0){alert("Sem estoque!");return;}
let item=carrinho.find(x=>x.index===i);
if(item){ if(item.qtd < p.estoque){item.qtd++;} }
else{ carrinho.push({index:i,qtd:1}); }
atualizar();
}

function atualizar(){
let lista=document.getElementById("lista");
let total=0,count=0;
lista.innerHTML="";
carrinho.forEach((item,i)=>{
let p=produtos[item.index];
total+=p.preco*item.qtd;
count+=item.qtd;
lista.innerHTML+=`
<div class="item">
${p.nome} x${item.qtd}
<div class="qtd">
<button onclick="menos(${i})">-</button>
<button onclick="mais(${i})">+</button>
</div>
</div>`;
});
document.getElementById("total").innerText="Total: R$ "+total.toFixed(2).replace('.',',');
document.getElementById("count").innerText=count;
}

function mais(i){
let item=carrinho[i];
let p=produtos[item.index];
if(item.qtd < p.estoque) item.qtd++;
atualizar();
}

function menos(i){
carrinho[i].qtd--;
if(carrinho[i].qtd<=0) carrinho.splice(i,1);
atualizar();
}

function verTroco(){
let p=document.getElementById("pagamento").value;
document.getElementById("boxTroco").style.display=p==="Dinheiro"?"block":"none";
}

function buscarCEP(){
let cep=document.getElementById("cep").value.replace(/\D/g,'');
fetch(`https://viacep.com.br/ws/${cep}/json/`)
.then(r=>r.json())
.then(d=>{
if(!d.erro){document.getElementById("rua").value=d.logradouro;}
});
}

function finalizarPedido(){

let nome=document.getElementById("nome").value;
let cpf=document.getElementById("cpf").value;
let semCpf=document.getElementById("semCpf").checked;
let rua=document.getElementById("rua").value;
let numero=document.getElementById("numero").value;
let ref=document.getElementById("referencia").value;
let cep=document.getElementById("cep").value;
let pag=document.getElementById("pagamento").value;
let troco=document.getElementById("troco").value;

if(!nome || !rua || !numero || !pag){
alert("Preencha tudo!");
return;
}

if(!semCpf && cpf.length < 11){
alert("CPF inválido!");
return;
}

if(carrinho.length===0){
alert("Carrinho vazio!");
return;
}

let total=0;
let msg="🛒 *NOVO PEDIDO*\n\n📦 *Itens:*\n";

carrinho.forEach(item=>{
let p=produtos[item.index];
msg+=`• ${p.nome} x${item.qtd}\n`;
total+=p.preco*item.qtd;
});

msg+=`\n💰 Total: R$ ${total.toFixed(2).replace('.',',')}\n\n`;
msg+=`👤 Nome: ${nome}\n`;
if(!semCpf) msg+=`CPF: ${cpf}\n`;

msg+=`\n📍 ${rua}, ${numero}\nCEP: ${cep}\nRef: ${ref}\n\n`;
msg+=`💳 ${pag}\n`;

if(pag==="Dinheiro" && troco){
msg+=`Troco para: ${troco}\n`;
}

carrinho.forEach(item=>{
produtos[item.index].estoque -= item.qtd;
});

let url="https://api.whatsapp.com/send?phone=5521971724498&text="+encodeURIComponent(msg);
window.open(url,"_blank");

carrinho=[];
atualizar();
renderProdutos();
toggleCart();
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="flex"?"none":"flex";
}

function voltarHome(){
document.getElementById("cart").style.display="none";
}

renderProdutos();

</script>

</body>
</html>
